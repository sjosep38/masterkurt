<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<title>Pizza POS System</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: #111;
    color: white;
    height: 100vh;
    overflow: hidden;
}

/* HEADER */
.header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 60px;
    z-index: 1000;
    background: black;
    padding: 10px 0;
    border-bottom: 1px solid black;
}

.brand {
    max-width: 100%;
    overflow: hidden;
}

.categories {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
    padding: 0 10px;
}

.categories::-webkit-scrollbar {
    display: none;
}

.category {
    flex: 0 0 auto;
    padding: 10px 20px;
    background: #2a2a2a;
    border-radius: 20px;
    cursor: pointer;
    transition: 0.3s;
    width: 100px;
    text-align: center;
}

.category.active,
.category:hover {
    background: orange;
    color: black;
}

/* MAIN */
.main-wrapper {
    display: flex;
    margin-top: 70px;
    height: calc(100vh - 70px);
}

.sidebar {
    width: 80px;
    background: #1a1a1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 0;
}

.sidebar div {
    margin: 20px 0;
    font-size: 22px;
    cursor: pointer;
    transition: 0.3s;
}

.sidebar div:hover {
    transform: scale(1.2);
}

.container {
    flex: 1;
    display: flex;
}

/* PRODUCTS */
.products-section {
    flex: 3;
    padding: 20px;
    overflow-y: auto;
}

.products {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 5px;
}

.card {
    background: gray;
    border-radius: 5px;
    padding: 5px;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

.card img {
    width: 100%;
    height: 100px;
    object-fit: cover;
    border-radius: 5px;
}

.card h5 {
    margin: 1px 0;
}

.card p {
    font-weight: bold;
    color: orange;
}

.card i {
    font-size: 25px;
    cursor: pointer;
}

/* CART */
.cart {
    flex: 1;
    background: #1a1a1a;
    padding: 10px;
    display: flex;
    flex-direction: column;
	max-height: 650px;
	min-height: 649px;
}

.cart-items {
    flex: 1;
    overflow-y: auto;
	
}

.cart-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 5px;
    background: #2a2a2a;
    padding: 10px;
    border-radius: 8px;
}

.qty-control {
    display: flex;
    gap: 5px;
    align-items: center;
}

.qty-control button {
    background: orange;
    border: none;
    width: 25px;
    height: 25px;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
}

.summary {
    margin-top: 15px;
    border-top: 1px solid #444;
    padding-top: 10px;
}

.summary div {
    display: flex;
    justify-content: space-between;
    margin: 5px 0;
}

.checkout-btn {
    background: orange;
    padding: 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 10px;
    font-weight: bold;
}

/* PAYMENT */
.payment {

    flex: 1;
    background: #1a1a1a;
    padding: 20px;
    display: flex;
    flex-direction: column;
}

.payment-total {
    text-align: center;
    margin: 30px 0;
}

.payment-total h1 {
    color: orange;
}

.payment-methods {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 20px;
}

.payment-methods button {
    padding: 12px 20px;
    background: #2a2a2a;
    border: none;
    border-radius: 8px;
    color: white;
    cursor: pointer;
    font-weight: bold;
	width:100%;
	
}

.payment-methods button.active {
    background: orange;
    color: black;
	width: 100%;
}

.back-btn,
.confirm-btn {
    background: orange;
    padding: 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 10px;
    font-weight: bold;
	width:100%;
}

.back-btn { background: gray; }
.confirm-btn { background: orange; }

/* Responsive */
@media(max-width:768px){
    body{overflow:auto;}
    .sidebar{display:none;}
    .main-wrapper{flex-direction:column;height:auto;}
    .container{flex-direction:column;}
    .products-section{height:auto;}
}

/* Bottom Navigation Bar */
.navbar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 62px;
    background: #161b22;
    border-top: 1px solid #2a2f38;
    display: flex;
    justify-content: space-around;
    align-items: center;
    z-index: 999;
}

/* Navigation Item */
.nav-item {
    text-align: center;
    color: var(--muted, #8b95a1);
    font-size: 0.75rem;
    flex: 1;
    padding-top: 6px;
    text-decoration: none;
    transition: color 0.2s, font-weight 0.2s;
    cursor: pointer;
}

/* Icon or span inside nav item */
.nav-item span {
    display: block;
    font-size: 1.2rem;
    margin-bottom: 3px;
    transition: transform 0.2s;
}

.nav-item:hover span {
    transform: scale(1.1);
}

/* Active nav item */
.nav-item.active {
    color: var(--accent, #58a6ff);
    font-weight: bold;
    text-decoration: underline; 
}

.nav-item.active span {
    transform: scale(1.9); 
}

.modal {
  display: none;
  position: fixed;
  z-index: 999;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
 
}

.modal-content {
  background: BLACK;
  margin-top: 50px;
  margin-left: 15PX;
  width: 100%;
  height: 100%;
  overflow-y: auto;
  align-items:center;
}

.close {
  float: right;
  font-size: 25px;
  cursor: pointer;
  color: BLACK;
}
</style>
</head>

<body>

<div class="header">
<div class="brand">
<div class="categories">
<div class="category active" onclick="filterCategory('All', event)">All</div>
<div class="category" onclick="filterCategory('Pizza', event)">Pizza</div>
<div class="category" onclick="filterCategory('Drinks', event)">Drinks</div>

<div class="category" onclick="filterCategory('Silog', event)">Silog</div>
<div class="category" onclick="filterCategory('Shake', event)">Shake</div>
</div>
</div>
</div>

<div class="main-wrapper">
<div class="container">

<div class="products-section">
<div class="products" id="productList"></div>
</div>
</div>
<br>
<br>
<br>
</div>

<nav class="navbar">
  <a href="https://silogmobile.pages.dev/" class="nav-item" onclick="openModal('homeModal')">
    🏠 HOME
  </a>

  <a href="#" class="nav-item" onclick="openModal('logsModal')">
    📄 VIEW CART
  </a>

  <a href="#" class="nav-item" onclick="PaymentModal()">
  
    ⚙️ PAY NOW
  </a>

   <a href="https://silogmobile.pages.dev/" class="nav-item" onclick="openModal('homeModal')">
    📊 CANCEL
  </a>

  <a href="#" class="nav-item" onclick="openModal('reportModal')">
    📝 Report
  </a>-->
</nav>

<!-- LOGS MODAL -->
<div id="logsModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal('logsModal')">&times;</span>
    <div class="cart">
<h2>Cart</h2>
<div class="cart-items" id="cartItems"></div>
<div class="summary">
<div><span>Subtotal</span><span id="subtotal">₱0.00</span></div>
<div><span>Discount</span><span id="tax">₱0.00</span></div>
<div><strong>Total</strong><strong id="total">₱0.00</strong></div>
</div>

<button class="checkout-btn" onclick="PaymentModal()">Proceed</button>
<button class="back-btn" onclick="closeModal('logsModal')">Menu</button>

</div>
</div>
</div>

<!-- PAYMENT MODAL -->
<div id="PaymentModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal('PaymentModal')">&times;</span>
<div class="payment" id="paymentSection" style="display:none;">
<h2>Payment Option</h2>

<div class="payment-methods">
<button onclick="selectPayment('Cash', event)">💵 Cash</button>
<button onclick="selectPayment('Card', event)">💳 Card</button>
</div>
<div class="cart-items" id="paymentCartItems"></div>
<div class="payment-total">
<h3>Total Amount</h3>
<h1 id="paymentTotal">₱0.00</h1>
</div>

<div id="cashForm" style="display:none; margin-top:20px;">
<label><b>Cash Received:</b></label>
<input type="number" id="cashInput" 
style="width: 80px; padding:8px;margin-top:5px;border-radius:6px;border:none;">
<div style="margin-top:10px;">
<strong>Change: <span id="changeAmount">₱0.00</span></strong>
</div>
</div>

<div id="cardQR" style="display:none; text-align:center; margin-top:20px;">
<p>Scan QR to Pay</p>
<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=PizzaPOSPayment" width="200">
<br><br>
<button onclick="simulateCardPayment()" 
style="padding:10px 20px;background:orange;border:none;border-radius:8px;cursor:pointer;width: 100%;">
I've Paid Via Card
</button>
</div>
<div class="payment-actions">
<button class="confirm-btn" onclick="confirmCashPayment()">Confirm Payment</button>
<button class="back-btn" onclick="goBack()">⬅ Back</button>
</div>
</div>
  </div>
</div>

<script>
/* ================= PRODUCTS ================= */
const TAX_RATE = 0.00; // 5% tax

const products = [
  { id: 1, name: "Classic Margherita", price: 12.99, category: "Pizza", image:"img/classic-margherita.jpeg" },
  { id: 2, name: "Hawaiian Pizza", price: 13.99, category: "Pizza", image:"" },
  { id: 3, name: "Coca Cola", price: 2.99, category: "Drinks", image:"" },
  { id: 4, name: "Halo-Halo", price: 13.99, category: "Dessert", image:"https://pusacatdogs.pages.dev/images/s2.jpg" },
  { id: 5, name: "Leche Flan", price: 13.99, category: "Dessert", image:"img/leche-flan.jpeg" },
  { id: 6, name: "Pork Silog", price: 12.99, category: "Silog", image:"img/pork-silog.jpeg" },
  { id: 7, name: "Coffee Latte", price: 12.99, category: "Coffee", image:"img/coffee-latte.jpeg" },
  { id: 8, name: "Kopiko", price: 2.99, category: "Coffee", image:"img/classic-margherita.jpeg" },
  { id: 9, name: "Fried Chicken", price: 8.99, category: "Fried", image:"img/fried-chicken.jpeg" },
  { id: 10, name: "Cookies & Cream", price: 2.99, category: "Shake", image:"img/ChocoKisses.jpeg" },
  { id: 11, name: "Choco Kisses", price: 2.99, category: "Shake", image:"img/choco-kisses.jpeg" },
  { id: 12, name: "Chocolate", price: 2.99, category: "Shake", image:"img/chocolate.jpeg" },
  { id: 13, name: "Hot Fudge", price: 2.99, category: "Shake", image:"img/hot-fudge.jpeg" },
  { id: 14, name: "Ube Macapuno", price: 2.99, category: "Shake", image:"img/ube-macapuno.jpeg" },
  { id: 15, name: "Mango", price: 2.99, category: "Shake", image:"img/classic-margherita.jpeg" },
  { id: 16, name: "Avocado", price: 2.99, category: "Shake", image:"img/classic-margherita.jpeg" },
  { id: 17, name: "Buko Pandan", price: 2.99, category: "Shake", image:"img/buko-pandan.jpeg" },
  { id: 18, name: "Taro", price: 2.99, category: "Shake", image:"img/taro.jpeg" },
  { id: 19, name: "Strawberry", price: 2.99, category: "Shake", image:"img/strawberry.jpeg" },
  { id: 20, name: "Vanilla", price: 2.99, category: "Shake", image:"img/vanilla.jpeg" },
  { id: 21, name: "Melon", price: 2.99, category: "Shake", image:"img/melon.jpeg" },
  { id: 22, name: "Caramel Macchiato", price: 2.99, category: "Shake", image:"img/caramel-macchiato.jpeg" },
  { id: 23, name: "Black Forest", price: 2.99, category: "Shake", image:"img/Black-Forest.jpeg" },
  { id: 24, name: "Double Dutch", price: 2.99, category: "Shake", image:"img/classic-margherita.jpeg" }
];

let cart = [];
let selectedPaymentMethod = "";
let finalTotal = 0;
let currentCategory = "All";

/* ================= RENDER PRODUCTS ================= */
function renderProducts(list) {
    const container = document.getElementById("productList");
    container.innerHTML = list.map(product => {
        const cartItem = cart.find(item => item.id === product.id);
        const qty = cartItem ? cartItem.qty : 0;
        return `
        <div class="card">
            <img src="${product.image}" alt="${product.name}">
            <h5>${product.name}</h5>
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <p>₱${product.price.toFixed(2)}</p>
                ${
                    qty === 0
                    ? `<i class="fas fa-shopping-cart"
                          style="cursor:pointer;font-size:22px;"
                          onclick="addToCart(${product.id})"></i>`
                    : `
                    <div style="display:flex;align-items:center;gap:5px;">
                        <button onclick="changeQty(${product.id}, -1)"
                            style="width:22px;height:22px;border:none;border-radius:5px;background:orange;font-weight:bold;">-</button>
                        <span style="min-width:20px;text-align:center;">${qty}</span>
                        <button onclick="changeQty(${product.id}, 1)"
                            style="width:22px;height:22px;border:none;border-radius:5px;background:orange;font-weight:bold;">+</button>
                    </div>
                    `
                }
            </div>
        </div>
        `;
    }).join("");
}

/* ================= CATEGORY FILTER ================= */
function filterCategory(category, e) {
currentCategory = category;
document.querySelectorAll('.category').forEach(c=>c.classList.remove('active'));
e.target.classList.add('active');

renderProducts(
    category==="All"
    ? products
    : products.filter(p=>p.category===category)
);
}

/* ================= CART FUNCTIONS ================= */
function addToCart(id){
const product=products.find(p=>p.id===id);
const item=cart.find(p=>p.id===id);
item?item.qty++:cart.push({...product,qty:1});
renderCart();
}

function changeQty(id,c){
const item=cart.find(i=>i.id===id);
if(!item)return;
item.qty+=c;
if(item.qty<=0) removeItem(id);
else renderCart();
}

function removeItem(id){
cart=cart.filter(i=>i.id!==id);
renderCart();
}

function renderCart(){
const container=document.getElementById("cartItems");
container.innerHTML=cart.map(item=>`
<div class="cart-item">
<div>${item.name}<br>₱${item.price.toFixed(2)}</div>
<div class="qty-control">
<button onclick="changeQty(${item.id},-1)">-</button>
${item.qty}
<button onclick="changeQty(${item.id},1)">+</button>
<button onclick="removeItem(${item.id})">X</button>
</div>
</div>`).join("");

updateSummary();

renderProducts(
currentCategory==="All"
? products
: products.filter(p=>p.category===currentCategory)
);
}

/* ================= SUMMARY ================= */
function updateSummary(){
const subtotal=cart.reduce((s,i)=>s+i.price*i.qty,0);
const tax=subtotal*TAX_RATE;
finalTotal=subtotal+tax;

document.getElementById("subtotal").innerText=`₱${subtotal.toFixed(2)}`;
document.getElementById("tax").innerText=`₱${tax.toFixed(2)}`;
document.getElementById("total").innerText=`₱${finalTotal.toFixed(2)}`;
}

/* ================= PAYMENT MODAL ================= */
function PaymentModal(){
if(cart.length===0){
alert("Cart is empty!");
return;
}
openModal("PaymentModal");

document.getElementById("paymentSection").style.display="flex";
/*document.getElementById("paymentCartItems").innerHTML=document.getElementById("cartItems").innerHTML;*/
document.getElementById("paymentTotal").innerText=`₱${finalTotal.toFixed(2)}`;

// Reset payment
selectedPaymentMethod="";
document.getElementById("cashForm").style.display="none";
document.getElementById("cardQR").style.display="none";
document.querySelectorAll(".payment-methods button").forEach(b=>b.classList.remove("active"));
document.getElementById("cashInput").value="";
document.getElementById("changeAmount").innerText="₱0.00";

// Add cash input listener
const cashInput=document.getElementById("cashInput");
cashInput.oninput=function(){
    const cash=parseFloat(this.value)||0;
    const change=cash-finalTotal;
    document.getElementById("changeAmount").innerText=change>=0?`₱${change.toFixed(2)}`:"₱0.00";
};
}

/* ================= PAYMENT ================= */
function selectPayment(method,e){
selectedPaymentMethod=method;
document.querySelectorAll(".payment-methods button").forEach(b=>b.classList.remove("active"));
e.target.classList.add("active");

document.getElementById("cashForm").style.display= method==="Cash"?"block":"none";
document.getElementById("cardQR").style.display= method==="Card"?"block":"none";

// reset inputs
if(method==="Cash"){
document.getElementById("cashInput").value="";
document.getElementById("changeAmount").innerText="₱0.00";
}
}

/* ================= CONFIRM PAYMENT ================= */
function confirmCashPayment(){
if(selectedPaymentMethod!=="Cash")
return alert("Select Cash payment");

const cash=parseFloat(document.getElementById("cashInput").value);
if(!cash||cash<finalTotal)
return alert("Insufficient cash");

completeOrder("Cash", finalTotal);
}

function simulateCardPayment(){

printReceipt(

"Card",

0,

0

);

}

/* ================= COMPLETE ORDER ================= */
function completeOrder(method, total){
const orderItems=[...cart];

alert("Payment Successful via "+method);
printReceipt(method,orderItems,total);

cart=[];
renderCart();
goBack();
}

function goBack(){
closeModal("PaymentModal");
document.getElementById("paymentSection").style.display="none";
document.getElementById("cashInput").value="";
document.getElementById("changeAmount").innerText="₱0.00";
selectedPaymentMethod="";
}

/* ================= RECEIPT ================= */
function completeOrder(method, total) {
    if(cart.length === 0) return;

    const orderItems = [...cart];

    // Close modal first to prevent overlay issues
    closeModal('PaymentModal');

    // Delay printing slightly to ensure modal is closed
    setTimeout(() => {
        printReceipt(method, orderItems, total);
    }, 100);

    // Clear cart
    cart = [];
    renderCart();
}

function printReceipt(method, items, total) {
    const receipt = window.open('', '', 'width=300,height=600');
    if(!receipt) {
        alert('Popup blocked! Please allow popups for this site.');
        return;
    }

    const itemList = items.map(i => `${i.name} x${i.qty} - ₱${(i.price*i.qty).toFixed(2)}`).join('<br>');

    receipt.document.write(`
        <html>
        <head>
            <title>Receipt</title>
            <style>
                body { font-family: monospace; padding: 10px; }
                h2,h3,h4 { margin: 5px 0; }
                hr { border: 1px dashed #000; }
                center { margin-top: 10px; }
            </style>
        </head>
        <body>
            <h2>Cart Avenue</h2>
            <hr>
            ${itemList}
            <hr>
            <h3>Total: ₱${total.toFixed(2)}</h3>
            <h3>Payment: ${method}</h3>
            <h4>${new Date().toLocaleString()}</h4>
            <hr>
            <center>Thank you!</center>
        </body>
        </html>
    `);

    receipt.document.close();
    receipt.focus(); // Focus is required for some browsers
    receipt.print();
    receipt.close();
}
/* ================= MODAL ================= */
function openModal(id){
  document.querySelectorAll('.modal').forEach(modal => modal.style.display = "none");
  document.getElementById(id).style.display = "block";
}

function closeModal(id){
  document.getElementById(id).style.display = "none";
}

// close when clicking outside
window.onclick = function(event){
  if(event.target.classList.contains("modal")){
      event.target.style.display="none";
  }
}

/* ================= INIT ================= */
renderProducts(products);


// ===== Open & Close Modal =====
function openModal(modalId) {
  document.getElementById(modalId).style.display = 'block';
  document.getElementById('paymentSection').style.display = 'block';
}

function closeModal(modalId) {
  document.getElementById(modalId).style.display = 'none';
  resetPayment();
}

// ===== Reset Payment Form =====
function resetPayment() {
  document.getElementById('cashForm').style.display = 'none';
  document.getElementById('cardQR').style.display = 'none';
  document.getElementById('cashInput').value = '';
  document.getElementById('changeAmount').textContent = '₱0.00';
  document.querySelector('.confirm-btn').style.display = 'block';
}

// ===== Payment Type Selection =====
function selectPayment(type) {
  const cashForm = document.getElementById('cashForm');
  const cardQR = document.getElementById('cardQR');
  const confirmBtn = document.querySelector('.confirm-btn');

  if(type === 'Cash') {
    cashForm.style.display = 'block';
    cardQR.style.display = 'none';
    confirmBtn.textContent = 'Confirm Cash Payment';
    confirmBtn.style.display = 'block';
  } else if(type === 'Card') {
    cashForm.style.display = 'none';
    cardQR.style.display = 'block';
    confirmBtn.style.display = 'none';
  }
}

// ===== Cash Change Calculation =====
document.getElementById('cashInput').addEventListener('input', function() {
  let total = parseFloat(document.getElementById('paymentTotal').textContent.replace('₱','')) || 0;
  let cash = parseFloat(this.value) || 0;
  let change = cash - total;
  document.getElementById('changeAmount').textContent = change >= 0 ? `₱${change.toFixed(2)}` : '₱0.00';
});

// ===== Confirm Cash Payment =====
function confirmCashPayment(){

let total =
parseFloat(
document.getElementById("paymentTotal")
.innerText.replace("₱","")
);

let cash =
parseFloat(
document.getElementById("cashInput").value
);

if(isNaN(cash) || cash < total){

alert("Not enough cash!");

return;

}

let change = cash - total;

document.getElementById(
"changeAmount"
).innerText = "₱" + change.toFixed(2);


/* PRINT */

printReceipt(

"Cash",

cash.toFixed(2),

change.toFixed(2)

);

}


/* ===== ORDER NUMBER ===== */
function generateOrderNo(){

return "ORD-" + Date.now().toString().slice(-6);

}

/* ===== PRINT RECEIPT ===== */


function printReceipt(

paymentType,

cashReceived=0,

change=0

){

if(cart.length===0)return;

let orderNo=generateOrderNo();

let total=

"₱"+finalTotal.toFixed(2);

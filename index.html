<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<title>MASTER KURT FOODHUB</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', sans-serif; }
body { background:#111; color:white; height:100vh; overflow:hidden; }

/* HEADER */
.header { position:fixed; top:0; left:0; right:0; height:60px; z-index:1000; background:#111; padding:10px 0; border-bottom:1px solid black; }
.brand { max-width:100%; overflow:hidden; }
.categories { display:flex; gap:10px; overflow-x:auto; scroll-behavior:smooth; -webkit-overflow-scrolling:touch; padding:0 10px; }
.categories::-webkit-scrollbar { display:none; }
.category { flex:0 0 auto; padding:5px; border:2px solid white; white; background: linear-gradient(90deg,rgba(139, 40, 224, 1) 0%, rgba(0, 212, 255, 1) 100%); border-radius:50px 20px; 20px; 50px; cursor:pointer; transition:0.3s; width:100px; text-align:center; }
.category.active, .category:hover {background: #00C3FF; color:White; border-radius:20px 50px 20px 50px;}

/* MAIN */
.main-wrapper { display:flex; margin-top:70px; height:calc(100vh - 70px);margin-bottom: 60px; }
.sidebar { width:80px; background:#111; display:flex; flex-direction:column; align-items:center; padding:20px 0; }
.sidebar div { margin:20px 0; font-size:22px; cursor:pointer; transition:0.3s; }
.sidebar div:hover { transform:scale(1.2); }
.container { flex:1; display:flex; }

/* PRODUCTS */
.products-section { flex:3; padding:10px; overflow-y:auto; margin-bottom: 60px;}
.products { display:grid; grid-template-columns:repeat(auto-fill, minmax(150px, 1fr)); gap:5px; }
.card {background: linear-gradient(90deg,rgba(2, 0, 36, 1) 0%, rgba(9, 9, 121, 1) 35%, rgba(0, 212, 255, 1) 100%); border:2px solid #00C3FF; border-radius:5px; padding:5px; transition:0.3s; }
.card:hover { transform:translateY(-5px); }
.card img { width:100%; height:100px; object-fit:cover; border-radius:5px; }
.card h5 { margin:1px 0; }
.card p { font-weight:bold; color:orange; }
.card i { font-size:20px; cursor:pointer; }
 h4 { margin:1px 0; }

/* CART */
.cart { flex:1; background: linear-gradient(0deg,rgba(34, 190, 195, 1) 0%, rgba(207, 99, 36, 1) 100%); padding:10px; display:flex; flex-direction:column; max-height:640px; min-height:639px; border-radius:15px; margin-top:15px}
.cart-items { flex:1; overflow-y:auto; }
.cart-item { display:flex; justify-content:space-between; align-items:center; margin-bottom:5px; background:#2a2a2a; padding:10px; border-radius:10px; }
.qty-control { display:flex; gap:5px; align-items:center; }
.qty-control button { background:orange; border:none; width:25px; height:25px; border-radius:5px; cursor:pointer; font-weight:bold; }
.summary { margin-top:15px; border-top:1px solid #444; padding-top:10px; }
.summary div { display:flex; justify-content:space-between; margin:5px 0; }
.checkout-btn { background:orange; padding:10px; border:none; border-radius:8px; cursor:pointer; margin-top:10px; font-weight:bold; }
.payment { flex:1; background:#111; display:flex; flex-direction:column; border-radius:15px;}
.payment-total { text-align:center; margin:5px 0; }
.payment-total h1 { color:orange; }
.payment-methods { display:flex; gap:10px; justify-content:center; margin-bottom:20px; }
.payment-methods button { padding:12px 20px; background:#2a2a2a; border:none; border-radius:8px; color:white; cursor:pointer; font-weight:bold; width:100%; }
.payment-methods button.active { background:orange; color:black; width:100%; }
.back-btn1, .back-btn, .confirm-btn { background:orange; padding:10px; border:none; border-radius:8px; cursor:pointer; margin-top:10px; font-weight:bold; width:100%; }
.back-btn { background:gray; }
.back-btn1 { background:GREEN; }
.confirm-btn { background:orange; }

/* Responsive */
@media(max-width:768px){
    body{overflow:auto;}
    .sidebar{display:none;}
    .main-wrapper{flex-direction:column;height:auto;}
    .container{flex-direction:column;}
    .products-section{height:auto;}
}

/* Bottom Navigation Bar */
.navbar { position:fixed; bottom:0; left:0; right:0; height:62px; background:#161b22; border-top:1px solid #2a2f38; display:flex; justify-content:space-around; align-items:center; z-index:999; }
.nav-item { text-align:center; color:#8b95a1; font-size:0.75rem; flex:1; padding-top:6px; text-decoration:none; transition:color 0.2s, font-weight 0.2s; cursor:pointer; }
.nav-item span { display:block; font-size:1.2rem; margin-bottom:3px; transition: transform 0.2s; }
.nav-item:hover span { transform:scale(1.1); }
.nav-item.active { color:#58a6ff; font-weight:bold; text-decoration:underline; }
.nav-item.active span { transform:scale(1.9); }

.modal { display:none; position:fixed; z-index:999; top:0; width:100%; height:100%;border-radius:8px; background:#111;}
.modal-content { background:#111; margin-top:50px; width:100%; border-radius:8px; height:100%;  padding:10px; overflow-y:auto; align-items:center; }
.close { float:right; font-size:25px; cursor:pointer; color:black; }

button.active{background:orange;color:black;}
</style>
</head>

<body>

<div class="header">
<div class="brand">
<div class="categories">
<div class="category active" onclick="filterCategory('All', event)">All</div>
<div class="category" onclick="filterCategory('Pizza', event)" >Pizza</div>
<div class="category" onclick="filterCategory('Drinks', event)">Drinks</div>
<div class="category" onclick="filterCategory('Dessert', event)">Dessert</div>
<div class="category" onclick="filterCategory('Coffee', event)">Coffee</div>
<div class="category" onclick="filterCategory('Fried', event)">Fried</div>
<div class="category" onclick="filterCategory('Silog', event)">Silog</div>
<div class="category" onclick="filterCategory('Shake', event)">Shake</div>
</div>
</div>
</div>

<div class="main-wrapper">
<div class="container">
<div class="products-section">
<div class="products" id="productList"></div>

</div>
</div>

</div>

<nav class="navbar">
 <!--  <a href="https://masterkurt.pages.dev/" class="nav-item" onclick="openModal('homeModal')">🏠 HOME</a> -->
  <a href="#" class="nav-item" onclick="openModal('logsModal')">📄 VIEW CART</a>
  <a href="#" class="nav-item" onclick="PaymentModal()">⚙️ PAY NOW</a>
  <a href="https://masterkurt.pages.dev/" class="nav-item" onclick="openModal('homeModal')">📊 CANCEL</a>
</nav>

<!-- CART MODAL -->
<div id="logsModal" class="modal">
<div class="modal-content">
<span class="close" onclick="closeModal('logsModal')"></span>
<div class="cart">
<h2>Cart</h2>
<div class="cart-items" id="cartItems"></div>
<div class="summary">
<div><span>Subtotal</span><span id="subtotal">₱0.00</span></div>
<div><span>Discount</span><span id="Discount">₱0.00</span></div>
<div><span>VAT 12%</span><span id="VAT">₱0.00</span></div>
<div><strong>Total</strong><strong id="total">₱0.00</strong></div>
</div>
<button class="checkout-btn" onclick="PaymentModal()">Proceed</button>
<button class="back-btn1" onclick="applyDiscount()">Apply Discount</button>
<button class="back-btn" onclick="closeModal('logsModal')">⬅ Back</button>
</div>
</div>
</div>

<!-- PAYMENT MODAL -->
<div id="PaymentModal" class="modal">
<div class="modal-content">
<span class="close" onclick="closeModal('PaymentModal')"></span>
<div class="payment" id="paymentSection" style="display:none; flex-direction:column;">

<div id="orderTypeOptions" style="background:linear-gradient(0deg,rgba(183, 232, 97, 0.41) 0%, rgba(184, 184, 184, 1) 49%, rgba(184, 184, 184, 1) 98%);padding:10px;  border:none; border-radius:8px; margin-top:10px; font-weight:bold; width:100%;">
<h4>Order Type</h4>
<div id="orderTypeOptions" style="display:flex;flex-direction:rows;gap:5px;margin-bottom:5px; border:none; border-radius:8px;  font-weight:bold; width:100%;">
<button onclick="selectOrderType('TakeOut',event)"; style=" padding:10px; border:none; border-radius:8px; cursor:pointer; margin-top:5px; font-weight:bold; width:33%;">🥡 TakeOut</button>
<button onclick="selectOrderType('DineIn',event)"; style=" padding:10px; border:none; border-radius:8px; cursor:pointer; margin-top:5px; font-weight:bold; width:33%;">🍽️ Dinning</button>
<button onclick="selectOrderType('Delivery',event)"; style=" padding:10px; border:none; border-radius:8px; cursor:pointer; margin-top:5px; font-weight:bold; width:33%;">🛵 Delivery</button>
</div>


<!-- Take Out Input -->
<div id="takeOutInput" style="display:none;">
<label><b>Nickname :</b></label>
<input id="nicknameInput"  placeholder="e.g Juan" style="width:100%; font-size: 22px;text-align:center; letter-spacing:3px; padding:1px;border-radius:6px;border:none;margin-top:5px;">
</div>
<!-- Dine In Input -->
<div id="dineInput" style="display:none;">
<label><b>Customer Number (1-50)</b></label>
<input id="tableInput" type="number" min="1" max="50" placeholder="e.g 2"
style="width:100%; font-size:22px; text-align:center; letter-spacing:3px; padding:1px; border-radius:6px; border:none; margin-top:5px;"
oninput="if(this.value.length>2)this.value=this.value.slice(0,2)">

</div>
<!-- Delivery Input -->
<div id="deliveryInput" style="display:none;">
<label><b>Mobile Number</b></label>
<input id="mobileInput" type="tel" placeholder="e.g. 09506825698" maxlength="11" style="width:100%; font-size: 22px; text-align:center; letter-spacing:3px; padding:1px;border-radius:6px;border:none;margin-top:5px;">
</div>
</div>

<div class="PaymentOption" style=" margin-bottom:5px;background:linear-gradient(0deg,rgba(183, 232, 97, 0.41) 0%, rgba(184, 184, 184, 1) 49%, rgba(184, 184, 184, 1) 98%); padding:10px; border:none; border-radius:8px; margin-top:10px; font-weight:bold; width:100%;">
<h4>Payment Option</h4>
<div class="payment-methods">
<button onclick="selectPayment('Cash', event)">💵 Cash</button>
<button onclick="selectPayment('Card', event)" >💳 GCash</button>
</div>
<div class="cart-items" id="paymentCartItems"></div>
<div class="payment-total">
<h3>Total Amount</h3>
<h1 id="paymentTotal">₱0.00</h1>
</div>

<div id="cashForm" style="display:none; margin-top:10px;">
<label><b>Cash Received:</b></label>
<input type="number" id="cashInput" placeholder="" maxlength="5" style="width:100%; font-size: 22px; padding:10px; text-align:center; letter-spacing:3px; padding:1px;border-radius:6px;border:none;margin-top:5px;" oninput="if(this.value.length>5)this.value=this.value.slice(0,5)">
<div style="margin-top:10px;">
<strong>Change: <span id="changeAmount">₱0.00</span></strong>
<button class="confirm-btn" onclick="confirmCashPayment();closeModal('logsModal')">Confirm  Cash Payment</button>
</div>
</div>

<div id="cardQR" style="display:none; text-align:center; margin-top:5px;">
<p>Scan QR to Pay</p>
<img src="https://github.com/sjosep38/masterkurt/blob/master/img/myqr.jpg?raw=true" width="150">
<button onclick="simulateCardPayment();closeModal('logsModal')" style="padding:10px 20px;background:orange;border:none;border-radius:8px;cursor:pointer;width: 100%;"><b>Confirm  GCash Payment</b></button>
</div>

<div class="payment-actions">
<button class="back-btn" onclick="goBack()">⬅ Back</button>
<br>
</div>
</div>
</div>
</div>

let cart = [];
let selectedPaymentMethod = "";
let finalTotal = 0;
let currentCategory = "All";
let selectedOrderType = "";
let orderExtraInfo = "";

// ================= RENDER PRODUCTS =================
function renderProducts(list){
  const container=document.getElementById("productList");
  container.innerHTML=list.map(p=>{ const item=cart.find(i=>i.id===p.id); const qty=item?item.qty:0;
    return `<div class="card">
      <img src="${p.image}" alt="${p.name}">
      <h5>${p.name}</h5>
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <p>₱${p.price.toFixed(2)}</p>
        ${qty===0?`<i class="fas fa-shopping-cart" onclick="addToCart(${p.id})"></i>`:
        `<div style="display:flex;align-items:center;gap:5px;">
          <button onclick="changeQty(${p.id},-1)"; style="width:24px;height:24px;border:none;border-radius:5px;background:orange;font-weight:bold;">-</button>
          <span>${qty}</span>
          <button onclick="changeQty(${p.id},1)"; style="width:24px;height:24px;border:none;border-radius:5px;background:orange;font-weight:bold;">+</button>
        </div>`}
      </div>
    </div>`;
  }).join("");
}

// ================= CATEGORY FILTER =================
function filterCategory(cat,e){
currentCategory=cat;
document.querySelectorAll('.category').forEach(c=>c.classList.remove('active'));
e.target.classList.add('active');
renderProducts(cat==="All"?products:products.filter(p=>p.category===cat));
}

// ================= CART FUNCTIONS =================
function addToCart(id){ const product=products.find(p=>p.id===id); const item=cart.find(i=>i.id===id); item?item.qty++:cart.push({...product,qty:1}); renderCart(); }
function changeQty(id,c){ const item=cart.find(i=>i.id===id); if(!item)return; item.qty+=c; if(item.qty<=0) removeItem(id); else renderCart(); }
function removeItem(id){ cart=cart.filter(i=>i.id!==id); renderCart(); }
function renderCart(){
  const container=document.getElementById("cartItems");
  container.innerHTML=cart.map(item=>`<div class="cart-item">
    <div>${item.name}<br>₱${item.price.toFixed(2)}</div>
    <div class="qty-control">
      <button onclick="changeQty(${item.id},-1)" style="width:24px;height:24px; border:none;border-radius:5px;background:orange;font-weight:bold;">-</button>${item.qty}<button onclick="changeQty(${item.id},1)"style="width:24px;height:24px; border:none;border-radius:5px;background:orange;font-weight:bold;">+</button>
      <button onclick="removeItem(${item.id})">X</button>
    </div></div>`).join("");
  updateSummary();
  renderProducts(currentCategory==="All"?products:products.filter(p=>p.category===currentCategory));
}
function updateSummary(){
  const subtotal=cart.reduce((s,i)=>s+i.price*i.qty,0);
  const tax=subtotal*TAX_RATE;
  finalTotal=subtotal+tax;
  document.getElementById("subtotal").innerText=`₱${subtotal.toFixed(2)}`;
  document.getElementById("tax").innerText=`₱${tax.toFixed(2)}`;
  document.getElementById("total").innerText=`₱${finalTotal.toFixed(2)}`;
}

// ================= PAYMENT =================
function selectPayment(method,e){
selectedPaymentMethod=method;
document.querySelectorAll(".payment-methods button").forEach(b=>b.classList.remove("active"));
if(e) e.target.classList.add("active");
document.getElementById("cashForm").style.display=(method==="Cash")?"block":"none";
document.getElementById("cardQR").style.display=(method==="Card")?"block":"none";
document.getElementById("cashInput").value="";
document.getElementById("changeAmount").innerText="₱0.00";
}

document.getElementById('cashInput').addEventListener('input',function(){
let total=parseFloat(document.getElementById('paymentTotal').textContent.replace('₱',''))||0;
let cash=parseFloat(this.value)||0;
let change=cash-total;
document.getElementById('changeAmount').textContent = change>=0?`₱${change.toFixed(2)}`:'₱0.00';
});

function confirmCashPayment(){
if(!selectedOrderType){ alert("Select Order Type First!"); return; }
if(selectedOrderType==="TakeOut"){ orderExtraInfo=document.getElementById("nicknameInput").value; if(orderExtraInfo===""){ alert("Enter Nickname"); return; } }
if(selectedOrderType==="DineIn"){ let table=parseInt(document.getElementById("tableInput").value); if(!table||table>50){ alert("Customer Number  max is 50"); return; } orderExtraInfo="Table "+table; }
if(selectedOrderType==="Delivery"){ orderExtraInfo=document.getElementById("mobileInput").value; if(orderExtraInfo.length<11){ alert("Enter valid mobile"); return; } }

let total=parseFloat(document.getElementById("paymentTotal").innerText.replace("₱",""));
let cash=parseFloat(document.getElementById("cashInput").value);
if(isNaN(cash)||cash<total){ alert("Not enough cash!"); return; }
let change=cash-total;

printReceipt("Cash", cash.toFixed(2), change.toFixed(2));
}

let nameQty = `${i.name} x${i.qty}`;
let price = `PHP ${(i.price*i.qty).toFixed(2)}`;

// calculate spaces to pad
let spaces = ' '.repeat(Math.max(0, lineWidth - nameQty.length - price.length));

receiptText += `${nameQty}${spaces}${price}\r\n`;
  });

  receiptText += "--------------------------------\r\n";
let receiptWidth = 32; // total width of the receipt line
let totalText = "TOTAL:"; 
let amountText = "PHP " + finalTotal.toFixed(2);

// Calculate number of spaces needed
let spaces = receiptWidth - totalText.length - amountText.length;
if (spaces < 0) spaces = 0; // prevent negative spacing

// Append line with right-aligned amount
receiptText += totalText + " ".repeat(spaces) + amountText + "\r\n";

console.log(receiptText);
  receiptText += "\r\n";

	sendReceiptToTelegram(receiptText);

`);

printWindow.close();

let discountEnabled = false;
let DISCOUNT_RATE = 0;

function applyDiscount() {
    const type = prompt("Select discount type:\n1 - Senior/PWD (20%)\n2 - Student (5%)\n3 - None");

    if(type === "1"){
        const pwd = prompt("Enter password for Senior/PWD discount:");
        if(pwd !== "1234"){ alert("Incorrect password!"); return; }
        DISCOUNT_RATE = 0.2;
        discountEnabled = true;
        alert("Senior/PWD discount applied!");
    }
    else if(type === "2"){
        const pwd = prompt("Enter password for Student discount:");
        if(pwd !== "1234"){ alert("Incorrect password!"); return; }
        DISCOUNT_RATE = 0.05;
        discountEnabled = true;
        alert("Student discount applied!");
    }
    else if(type === "3"){
        DISCOUNT_RATE = 0;
        discountEnabled = false;
        alert("Discount removed.");
    }
    else { alert("Invalid selection."); return; }

    updateSummary();
}
function updateSummary(){
    const subtotal = cart.reduce((s,i)=>s+i.price*i.qty,0);
    const discountAmount = discountEnabled ? subtotal * DISCOUNT_RATE : 0;
    const tax = subtotal * TAX_RATE;
    finalTotal = subtotal + tax - discountAmount;

    document.getElementById("subtotal").innerText = `₱${subtotal.toFixed(2)}`;
    document.getElementById("Discount").innerText = `₱${discountAmount.toFixed(2)}`;
    document.getElementById("VAT").innerText = `₱${tax.toFixed(2)}`;
    document.getElementById("total").innerText = `₱${finalTotal.toFixed(2)}`;

    // Update payment modal total if open
    const paymentTotalEl = document.getElementById("paymentTotal");
    if(paymentTotalEl) paymentTotalEl.innerText = `₱${finalTotal.toFixed(2)}`;
}

<!DOCTYPE html>

<head>
<meta charset="UTF-8">

<title>MASTER KURT FOODHUB</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', sans-serif; }
body { background:#111; color:white; height:100vh; overflow:hidden; }

/* HEADER */
.header { position:fixed; top:0; left:0; right:0; height:60px; z-index:1000; background:black; padding:10px 0; border-bottom:1px solid black; }
.brand { max-width:100%; overflow:hidden; }
.categories { display:flex; gap:10px; overflow-x:auto; scroll-behavior:smooth; -webkit-overflow-scrolling:touch; padding:0 10px; }
.categories::-webkit-scrollbar { display:none; }
.category { flex:0 0 auto; padding:10px 20px; border:2px solid white; white; background: linear-gradient(90deg,rgba(139, 40, 224, 1) 0%, rgba(0, 212, 255, 1) 100%); border-radius:50px 20px; 20px; 50px; cursor:pointer; transition:0.3s; width:100px; text-align:center; }
.category.active, .category:hover {background: #00C3FF; color:White; border-radius:20px 50px 20px 50px;}

/* MAIN */
.main-wrapper { display:flex; margin-top:70px; height:calc(100vh - 70px); }
.sidebar { width:80px; background:#1a1a1a; display:flex; flex-direction:column; align-items:center; padding:20px 0; }
.sidebar div { margin:20px 0; font-size:22px; cursor:pointer; transition:0.3s; }
.sidebar div:hover { transform:scale(1.2); }
.container { flex:1; display:flex; }

/* PRODUCTS */
.products-section { flex:3; padding:10px; overflow-y:auto; margin-bottom: 50px;}
.products { display:grid; grid-template-columns:repeat(auto-fill, minmax(150px, 1fr)); gap:5px; }
.card {background: linear-gradient(90deg,rgba(2, 0, 36, 1) 0%, rgba(9, 9, 121, 1) 35%, rgba(0, 212, 255, 1) 100%); border:2px solid #00C3FF; border-radius:5px; padding:5px; transition:0.3s; }
.card:hover { transform:translateY(-5px); }
.card img { width:100%; height:100px; object-fit:cover; border-radius:5px; }
.card h4 { margin:1px 0; }
.card p { font-weight:bold; color:orange; }
.card i { font-size:30px; cursor:pointer; }

/* CART */
.cart { flex:1; background:#1a1a1a; padding:10px; display:flex; flex-direction:column; max-height:621px; min-height:620px; border-radius:15px; }
.cart-items { flex:1; overflow-y:auto; }
.cart-item { display:flex; justify-content:space-between; align-items:center; margin-bottom:5px; background:#2a2a2a; padding:10px; border-radius:10px; }
.qty-control { display:flex; gap:5px; align-items:center; }
.qty-control button { background:orange; border:none; width:25px; height:25px; border-radius:5px; cursor:pointer; font-weight:bold; }
.summary { margin-top:15px; border-top:1px solid #444; padding-top:10px; }
.summary div { display:flex; justify-content:space-between; margin:5px 0; }
.checkout-btn { background:orange; padding:10px; border:none; border-radius:8px; cursor:pointer; margin-top:10px; font-weight:bold; }
.payment { flex:1; background:#1a1a1a; padding:10px; display:flex; flex-direction:column; border-radius:15px;}
.payment-total { text-align:center; margin:5px 0; }
.payment-total h1 { color:orange; }
.payment-methods { display:flex; gap:10px; justify-content:center; margin-bottom:20px; }
.payment-methods button { padding:12px 20px; background:#2a2a2a; border:none; border-radius:8px; color:white; cursor:pointer; font-weight:bold; width:100%; }
.payment-methods button.active { background:orange; color:black; width:100%; }
.back-btn, .confirm-btn { background:orange; padding:10px; border:none; border-radius:8px; cursor:pointer; margin-top:10px; font-weight:bold; width:100%; }
.back-btn { background:gray; }
.confirm-btn { background:orange; }

/* Responsive */
@media(max-width:768px){
    body{overflow:auto;}
    .sidebar{display:none;}
    .main-wrapper{flex-direction:column;height:auto;}
    .container{flex-direction:column;}
    .products-section{height:auto;}
}

/* Bottom Navigation Bar */
.navbar { position:fixed; bottom:0; left:0; right:0; height:62px; background:#161b22; border-top:1px solid #2a2f38; display:flex; justify-content:space-around; align-items:center; z-index:999; }
.nav-item { text-align:center; color:#8b95a1; font-size:0.75rem; flex:1; padding-top:6px; text-decoration:none; transition:color 0.2s, font-weight 0.2s; cursor:pointer; }
.nav-item span { display:block; font-size:1.2rem; margin-bottom:3px; transition: transform 0.2s; }
.nav-item:hover span { transform:scale(1.1); }
.nav-item.active { color:#58a6ff; font-weight:bold; text-decoration:underline; }
.nav-item.active span { transform:scale(1.9); }

.modal { display:none; position:fixed; z-index:999; top:0; width:100%; height:100%;border-radius:8px; background:#1a1a1a;}
.modal-content { background:#1a1a1a; margin-top:50px; margin-left:5px; width:100%; border-radius:8px; height:100%; overflow-y:auto; align-items:center; }
.close { float:right; font-size:25px; cursor:pointer; color:black; }

button.active{background:orange;color:black;}

let finalTotal = 0;
let currentCategory = "All";

let orderExtraInfo = "";

// ================= RENDER PRODUCTS =================
function renderProducts(list){
  const container=document.getElementById("productList");
  container.innerHTML=list.map(p=>{ const item=cart.find(i=>i.id===p.id); const qty=item?item.qty:0;
    return `<div class="card">
      <img src="${p.image}" alt="${p.name}">
      <h4>${p.name}</h4>
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <p>₱${p.price.toFixed(2)}</p>
        ${qty===0?`<i class="fas fa-shopping-cart" onclick="addToCart(${p.id})"></i>`:
        `<div style="display:flex;align-items:center;gap:5px;">
          <button onclick="changeQty(${p.id},-1)"; style="width:24px;height:24px;border:none;border-radius:5px;background:orange;font-weight:bold;">-</button>
          <span>${qty}</span>
          <button onclick="changeQty(${p.id},1)"; style="width:24px;height:24px;border:none;border-radius:5px;background:orange;font-weight:bold;">+</button>
        </div>`}
      </div>
    </div>`;
  }).join("");
}

// ================= CATEGORY FILTER =================
function filterCategory(cat,e){
currentCategory=cat;
document.querySelectorAll('.category').forEach(c=>c.classList.remove('active'));
e.target.classList.add('active');
renderProducts(cat==="All"?products:products.filter(p=>p.category===cat));
}

// ================= CART FUNCTIONS =================
function addToCart(id){ const product=products.find(p=>p.id===id); const item=cart.find(i=>i.id===id); item?item.qty++:cart.push({...product,qty:1}); renderCart(); }
function changeQty(id,c){ const item=cart.find(i=>i.id===id); if(!item)return; item.qty+=c; if(item.qty<=0) removeItem(id); else renderCart(); }
function removeItem(id){ cart=cart.filter(i=>i.id!==id); renderCart(); }
function renderCart(){
  const container=document.getElementById("cartItems");
  container.innerHTML=cart.map(item=>`<div class="cart-item">
    <div>${item.name}<br>₱${item.price.toFixed(2)}</div>
    <div class="qty-control">
      <button onclick="changeQty(${item.id},-1)" style="width:24px;height:24px; border:none;border-radius:5px;background:orange;font-weight:bold;">-</button>${item.qty}<button onclick="changeQty(${item.id},1)"style="width:24px;height:24px; border:none;border-radius:5px;background:orange;font-weight:bold;">+</button>
      <button onclick="removeItem(${item.id})">X</button>
    </div></div>`).join("");
  updateSummary();
  renderProducts(currentCategory==="All"?products:products.filter(p=>p.category===currentCategory));
}
function updateSummary(){
  const subtotal=cart.reduce((s,i)=>s+i.price*i.qty,0);
  const tax=subtotal*TAX_RATE;
  finalTotal=subtotal+tax;
  document.getElementById("subtotal").innerText=`₱${subtotal.toFixed(2)}`;
  document.getElementById("tax").innerText=`₱${tax.toFixed(2)}`;
  document.getElementById("total").innerText=`₱${finalTotal.toFixed(2)}`;
}

// ================= PAYMENT MODAL =================
function PaymentModal(){
if(cart.length===0){ alert("Cart is empty!"); return; }
openModal("PaymentModal");
document.getElementById("paymentSection").style.display="flex";
selectedPaymentMethod="";
document.getElementById("cashForm").style.display="none";
document.getElementById("cardQR").style.display="none";
document.querySelectorAll(".payment-methods button").forEach(b=>b.classList.remove("active"));
document.getElementById("cashInput").value="";
document.getElementById("changeAmount").innerText="₱0.00";
document.getElementById("paymentTotal").innerText=`₱${finalTotal.toFixed(2)}`;
}

// ================= SELECT ORDER TYPE =================
function selectOrderType(type,e){
selectedOrderType=type;
document.querySelectorAll("#orderTypeOptions button").forEach(b=>b.classList.remove("active"));
e.target.classList.add("active");
document.getElementById("takeOutInput").style.display="none";
document.getElementById("dineInput").style.display="none";
document.getElementById("deliveryInput").style.display="none";
if(type==="TakeOut") document.getElementById("takeOutInput").style.display="block";
if(type==="DineIn") document.getElementById("dineInput").style.display="block";
if(type==="Delivery") document.getElementById("deliveryInput").style.display="block";
}

// ================= PAYMENT =================
function selectPayment(method,e){
selectedPaymentMethod=method;
document.querySelectorAll(".payment-methods button").forEach(b=>b.classList.remove("active"));
if(e) e.target.classList.add("active");
document.getElementById("cashForm").style.display=(method==="Cash")?"block":"none";
document.getElementById("cardQR").style.display=(method==="Card")?"block":"none";
document.getElementById("cashInput").value="";
document.getElementById("changeAmount").innerText="₱0.00";
}

document.getElementById('cashInput').addEventListener('input',function(){
let total=parseFloat(document.getElementById('paymentTotal').textContent.replace('₱',''))||0;
let cash=parseFloat(this.value)||0;
let change=cash-total;
document.getElementById('changeAmount').textContent = change>=0?`₱${change.toFixed(2)}`:'₱0.00';
});

function confirmCashPayment(){
if(!selectedOrderType){ alert("Select Order Type First!"); return; }
if(selectedOrderType==="TakeOut"){ orderExtraInfo=document.getElementById("nicknameInput").value; if(orderExtraInfo===""){ alert("Enter Nickname"); return; } }
if(selectedOrderType==="DineIn"){ let table=parseInt(document.getElementById("tableInput").value); if(!table||table>50){ alert("Table max is 50"); return; } orderExtraInfo="Table "+table; }
if(selectedOrderType==="Delivery"){ orderExtraInfo=document.getElementById("mobileInput").value; if(orderExtraInfo.length<11){ alert("Enter valid mobile"); return; } }

let total=parseFloat(document.getElementById("paymentTotal").innerText.replace("₱",""));
let cash=parseFloat(document.getElementById("cashInput").value);
if(isNaN(cash)||cash<total){ alert("Not enough cash!"); return; }
let change=cash-total;

printReceipt("Cash", cash.toFixed(2), change.toFixed(2));
}

function simulateCardPayment(){ printReceipt("Card", 0, 0); }

function goBack(){ closeModal("PaymentModal"); document.getElementById("paymentSection").style.display="none"; selectedPaymentMethod=""; selectedOrderType=""; orderExtraInfo=""; }

// ================= RECEIPT =================
function printReceipt(paymentType, cashReceived = 0, change = 0) {
  if (cart.length === 0) return;

  let orderNo = "ORD-" + Date.now().toString().slice(-6);
  let now = new Date();
  let dateTime = now.toLocaleString();

  let receiptText = "";
  receiptText += "      MASTER KURT FOODHUB\r\n";
  receiptText += "2530 Isagani St. Sta Cruz Manila\r\n";
  receiptText += "  Mobile Number: 0950-682-5698\r\n";
  receiptText += "--------------------------------\r\n";
  receiptText += "Order slip No: " + orderNo + "\r\n";
  receiptText += dateTime + "\r\n";
  receiptText += "--------------------------------\r\n";

  cart.forEach(i => {
    receiptText += `${i.name} x${i.qty}   PHP ${ (i.price*i.qty).toFixed(2) }\r\n`;
  });

  receiptText += "--------------------------------\r\n";
  receiptText += "         TOTAL: PHP " + finalTotal.toFixed(2) + "\r\n";
  receiptText += "\r\n";
  receiptText += "Order Type  : " + selectedOrderType + "\r\n";
  receiptText += "Details     : " + orderExtraInfo + "\r\n";
  receiptText += "Payment     : " + paymentType + "\r\n";
  receiptText += "Cash        : PHP " + cashReceived + "\r\n";
  receiptText += "Change     : PHP " + change + "\r\n";
  receiptText += "--------------------------------\r\n";
  
  receiptText += "  Thank you for your Purchase!\r\n\r\n\r\n";


  let printWindow = window.open('', '', 'width=400,height=600');
  printWindow.document.write('<pre>' + receiptText + '</pre>');
  printWindow.document.close();
  printWindow.focus();
  printWindow.print();  // triggers print dialog automatically
  printWindow.close();



  // Use escape instead of encodeURIComponent
  let encodedText = escape(receiptText);

  // Open intent for Bluetooth printing
  window.location.href =
    "intent://sendtext#Intent;" +
    "action=android.intent.action.SEND;" +
    "package=mate.bluetoothprint;" +
    "S.android.intent.extra.TEXT=" + encodedText + ";" +
    "type=text/plain;" +
    "end;" +
    "browser_fallback_url=https://www.webtonative.com/";

  cart = [];
  renderCart();
  goBack();
}
// ================= MODAL =================
function openModal(id){ document.getElementById(id).style.display='block'; document.getElementById('paymentSection').style.display='flex'; }
function closeModal(id){ document.getElementById(id).style.display='none'; }

// ================= INIT =================
renderProducts(products);
</script>
